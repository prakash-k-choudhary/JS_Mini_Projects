    <h1>BMI Calculator</h1>
    <form action="">
    <label for="height">Height in CM : </label>
    <input type="number" id="height" placeholder="pls enter ur height" />
    <br /><br />
    <label for="weight">Weight in KG : </label>
    <input type="number" id="weight" placeholder="pls enter ur Weight" />
    <br /><br /><br />
    <div class="bottom">
      <input class="submit" type="submit" , value="Calculate" />
      <h2 id="result"></h2>
      <h3>BMI Weight Guide</h3>
      <h5>Under Weight = Less than 18.6</h5>
      <h4>Normal Range = 18.6 and 24.9</h4>
      <h4>Overweight = Greater than 24.9</h4>
    </div>
    </form>
